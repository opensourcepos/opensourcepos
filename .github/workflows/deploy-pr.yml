name: PR Deploy

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    if: github.event.review.state == 'approved'
    environment:
      name: staging
      url: https://dev.opensourcepos.org
    
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      
      - name: Get image tag
        id: image
        run: |
          SHA="${{ github.event.pull_request.head.sha }}"
          IMAGE_TAG="pr-${{ github.event.pull_request.number }}-${SHA:0:7}"
          echo "tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
      
      - name: Create GitHub Deployment
        id: deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DEPLOYMENT_ID=$(gh api repos/${{ github.repository }}/deployments \
            -X POST \
            -f ref="${{ github.event.pull_request.head.sha }}" \
            -f environment="staging" \
            -f description="Deploy PR #${{ github.event.pull_request.number }} to staging" \
            -f auto_merge=false \
            -F required_contexts=[] \
            --jq '.id')
          
          echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT
          echo "Created deployment: $DEPLOYMENT_ID"
      
      - name: Set deployment status to in_progress
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/deployments/${{ steps.deployment.outputs.deployment_id }}/statuses \
            -X POST \
            -f state="in_progress" \
            -f description="Deploying PR #${{ github.event.pull_request.number }}..." \
            -f log_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      
      - name: Trigger deployment webhook
        id: webhook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
          DOCKER_REPO_NAME: ${{ secrets.DOCKER_REPO_NAME }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "::warning::DEPLOY_WEBHOOK_URL secret is not configured"
            echo "status=success" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          IMAGE_TAG="${{ steps.image.outputs.tag }}"
          REPO_NAME="${DOCKER_REPO_NAME:-opensourcepos/opensourcepos}"
          PUSHED_AT=$(date +%s)
          
          WEBHOOK_URL="$DEPLOY_WEBHOOK_URL"
          if [ -n "$DEPLOY_WEBHOOK_TOKEN" ]; then
            WEBHOOK_URL="${DEPLOY_WEBHOOK_URL}?token=${DEPLOY_WEBHOOK_TOKEN}"
          fi
          
          PAYLOAD=$(cat <<EOF
          {
            "callback_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "push_data": {
              "pushed_at": ${PUSHED_AT},
              "pusher": "${{ github.actor }}",
              "tag": "${IMAGE_TAG}"
            },
            "repository": {
              "repo_name": "${REPO_NAME}",
              "name": "$(echo $REPO_NAME | cut -d'/' -f2)",
              "namespace": "$(echo $REPO_NAME | cut -d'/' -f1)",
              "repo_url": "https://hub.docker.com/r/${REPO_NAME}/",
              "status": "Active"
            },
            "github_deployment": {
              "id": "${{ steps.deployment.outputs.deployment_id }}",
              "environment": "staging",
              "repository": "${{ github.repository }}",
              "sha": "${{ github.event.pull_request.head.sha }}",
              "run_id": "${{ github.run_id }}",
              "actor": "${{ github.actor }}",
              "pull_request": ${{ github.event.pull_request.number }}
            }
          }
          EOF
          )
          
          echo "Sending Docker Hub compatible webhook..."
          echo "Image: ${IMAGE_TAG}"
          
          HTTP_CODE=$(curl -s -o response.txt -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$WEBHOOK_URL")
          
          echo "Response code: $HTTP_CODE"
          cat response.txt 2>/dev/null || true
          
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi
      
      - name: Set deployment status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          STATE="${{ steps.webhook.outputs.status }}"
          
          if [ "$STATE" = "success" ]; then
            gh api repos/${{ github.repository }}/deployments/${{ steps.deployment.outputs.deployment_id }}/statuses \
              -X POST \
              -f state="success" \
              -f description="Deployed PR #${{ github.event.pull_request.number }} to staging"
          else
            gh api repos/${{ github.repository }}/deployments/${{ steps.deployment.outputs.deployment_id }}/statuses \
              -X POST \
              -f state="failure" \
              -f description="Staging deployment failed"
            exit 1
          fi
      
      - name: Comment deployment status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          STATUS: ${{ steps.webhook.outputs.status }}
        run: |
          if [ "$STATUS" = "success" ]; then
            BODY="✅ **Staging deployment completed**
            
            🔗 **URL**: https://dev.opensourcepos.org
            📦 **Image Tag**: \`${{ steps.image.outputs.tag }}\`
            🔨 **Commit**: ${{ github.event.pull_request.head.sha }}
            
            View logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            BODY="❌ **Staging deployment failed**
            
            Check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
          fi
          
          gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            -X POST \
            -f body="$BODY"