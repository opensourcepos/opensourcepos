                    type: boolean
                    example: true
                  message:
                    type: string
                  id:
                    type: integer
                    description: New item ID
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
