  # ============================================
  # ITEMS
  # ============================================
  /items:
    get:
      tags:
        - Items
      summary: List items
      description: Retrieve a paginated list of items
      operationId: listItems
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Search term for name, barcode, category, supplier
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
          description: Number of records to skip
        - name: limit
          in: query
          schema:
            type: integer
            default: 25
            maximum: 100
          description: Number of records to return
        - name: sort
          in: query
          schema:
            type: string
            enum: [item_id, name, category, cost_price, unit_price]
            default: name
          description: Field to sort by
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
          description: Sort order
        - name: stock_location
          in: query
          schema:
            type: integer
          description: Filter by stock location ID
        - name: filters
          in: query
          schema:
            type: array
            items:
              type: string
              enum: [empty_upc, low_inventory, is_serialized, no_description, is_deleted]
          description: Additional filters
          explode: false
        - name: start_date
          in: query
          schema:
            type: string
            format: date
          description: Filter from date
        - name: end_date
          in: query
          schema:
            type: string
            format: date
          description: Filter to date
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedItems'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags:
        - Items
      summary: Create an item
      description: Create a new item
      operationId: createItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemInput'
      responses:
